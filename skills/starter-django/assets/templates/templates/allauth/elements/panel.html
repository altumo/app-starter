{% load allauth %}
<div class="bg-white border border-gray-200 rounded-xl shadow-sm p-6">
  {% if slots.title %}
  <div class="mb-6">
    {% render_slot slots.title %}
  </div>
  {% endif %}
  {% render_slot slots.body %}
  {% if slots.actions %}
  <div class="mt-6 flex flex-col gap-3">
    {% render_slot slots.actions %}
  </div>
  {% endif %}
</div>
