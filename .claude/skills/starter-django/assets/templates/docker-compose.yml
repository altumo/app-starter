services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-__PROJECT_NAME__}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-__PROJECT_NAME__}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: python:3.12-slim
    working_dir: /app
    command: >
      sh -c "
        apt-get update && apt-get install -y --no-install-recommends libpq-dev gcc postgresql-client &&
        pip install --no-cache-dir -r requirements.txt &&
        python manage.py migrate --no-input &&
        python manage.py runserver 0.0.0.0:8000
      "
    volumes:
      - ./backend:/app
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-__PROJECT_NAME__}
      DB_HOST: db
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: node:22-alpine
    working_dir: /app
    command: >
      sh -c "
        npm install &&
        npm run dev
      "
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    env_file:
      - ./frontend/.env.local
    environment:
      DJANGO_API_URL: http://backend:8000
    depends_on:
      - backend

volumes:
  postgres_data:
  frontend_node_modules:
